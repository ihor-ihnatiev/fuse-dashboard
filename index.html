<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuse Service — Marketing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f7;--bg3:#efefef;--text:#111;--text2:#555;--text3:#999;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--accent:#E30B2E;--blue:#378ADD;--green:#1D9E75;--amber:#BA7517;--purple:#7F77DD;--r:8px;--rl:12px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#aaa;--text3:#666;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15)}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:20px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:6px;overflow:hidden;flex-shrink:0}
.logo-mark img{width:32px;height:32px;object-fit:cover;display:block}
.logo-text{font-size:15px;font-weight:600}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.save-dot{width:6px;height:6px;border-radius:50%;background:#639922;flex-shrink:0}
.save-lbl{font-size:11px;color:var(--text3)}
.hbtn{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:5px 12px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.hbtn:hover{background:var(--bg3)}
/* period bar */
.period-row{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.bar-lbl{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-right:4px;white-space:nowrap}
/* calendar */
.cal-wrap{position:relative}
.cal-pop{position:absolute;top:calc(100% + 6px);left:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);padding:14px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:99;min-width:230px;display:none}
.cal-pop.open{display:block}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-yr{font-size:13px;font-weight:600}
.cal-arr{background:none;border:none;cursor:pointer;color:var(--text2);font-size:15px;padding:2px 6px;border-radius:4px;font-family:inherit}
.cal-arr:hover{background:var(--bg2)}
.cal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cal-m{font-size:11px;padding:5px 3px;border-radius:5px;border:1px solid transparent;cursor:pointer;text-align:center;color:var(--text2);background:transparent;font-family:inherit;transition:all .1s}
.cal-m:hover{background:var(--bg2)}
.cal-m.has{border-color:var(--border2);color:var(--text)}
.cal-m.sel{background:var(--text);color:var(--bg)}
/* tabs */
.mtab,.stab{font-size:12px;padding:4px 10px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:4px;user-select:none;white-space:nowrap}
.mtab:hover,.stab:hover{background:var(--bg2)}
.mtab.sel{background:var(--text);color:var(--bg);border-color:transparent}
.stab{color:var(--text3)}.stab.on{background:var(--accent);color:#fff;border-color:transparent}
.mtab-x{font-size:10px;opacity:.4}.mtab:hover .mtab-x,.mtab.sel .mtab-x{opacity:.7}
.add-m-btn{font-size:12px;padding:4px 9px;border-radius:var(--r);border:1px dashed var(--border2);background:transparent;cursor:pointer;color:var(--text3);font-family:inherit;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.add-m-btn:hover{color:var(--text);background:var(--bg2)}
/* source nav */
.src-nav{display:flex;align-items:center;gap:4px;margin:16px 0 0;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.src-nav-btn{font-size:13px;padding:8px 16px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.src-nav-btn:hover{color:var(--text);background:var(--bg2)}
.src-nav-btn.on{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.src-nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* pages */
.page{display:none;padding-top:20px}.page.on{display:block}
/* kpi */
.kpi-row{display:grid;gap:8px;margin-bottom:18px}
.kpi-row.c4{grid-template-columns:repeat(4,1fr)}.kpi-row.c6{grid-template-columns:repeat(6,1fr)}.kpi-row.c3{grid-template-columns:repeat(3,1fr)}.kpi-row.c5{grid-template-columns:repeat(5,1fr)}
@media(max-width:900px){.kpi-row.c6,.kpi-row.c4{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.kpi-row{grid-template-columns:repeat(2,1fr)!important}}
.kpi{background:var(--bg2);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border)}
.kpi.accent{border-left:3px solid var(--accent)}.kpi.green{border-left:3px solid var(--green)}.kpi.blue{border-left:3px solid var(--blue)}.kpi.amber{border-left:3px solid var(--amber)}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.03em;text-transform:uppercase}
.kpi-val{font-size:20px;font-weight:600;line-height:1}
.kpi-sub{font-size:10px;margin-top:4px;color:var(--text3)}
.cup{color:#27500A}.cdn{color:#791F1F}
@media(prefers-color-scheme:dark){.cup{color:#97C459}.cdn{color:#F09595}}
/* charts */
.charts-row{display:grid;gap:12px;margin-bottom:18px}
.charts-row.c2{grid-template-columns:1fr 1fr}.charts-row.c3{grid-template-columns:1.3fr .85fr .85fr}
@media(max-width:800px){.charts-row.c2,.charts-row.c3{grid-template-columns:1fr}}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.ct{font-size:12px;font-weight:600;margin-bottom:2px}.cs{font-size:10px;color:var(--text3);margin-bottom:10px}
/* card */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:16px}
.card-hdr{padding:12px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600}.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
/* view toggle */
.vtog{display:flex;gap:4px;background:var(--bg2);border-radius:var(--r);padding:3px;border:1px solid var(--border)}
.vbtn{font-size:11px;padding:3px 10px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .12s}
.vbtn.on{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* table */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;table-layout:fixed}
.grp-spend{background:rgba(55,138,221,0.06)}.grp-funnel{background:rgba(29,158,117,0.06)}.grp-fin{background:rgba(186,117,23,0.07)}
thead tr.grp th{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 8px;border-bottom:none;text-align:center;color:var(--text3)}
thead tr.cols th{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.04em;text-align:right;padding:7px 8px;border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;background:var(--bg2)}
thead tr.cols th.L{text-align:left}
tbody td{font-size:12px;color:var(--text);padding:0;border-bottom:1px solid var(--border);vertical-align:middle}
.cell{padding:8px 8px;display:flex;align-items:center;justify-content:flex-end;min-height:38px}
.cell.L{justify-content:flex-start}
.tot td{background:var(--bg2)}.tot .cell{font-weight:600}
.camp-row td{background:var(--bg)}.camp-row:hover td{background:var(--bg2)}
.src-row td{background:var(--bg);cursor:pointer}.src-row:hover td{background:var(--bg2)}
.src-dot{width:8px;height:8px;border-radius:50%;margin-right:7px;display:inline-block;flex-shrink:0}
.camp-indent{padding-left:20px}
/* inputs */
input[type="number"]{width:100%;background:transparent;border:none;font-size:12px;color:var(--text);-webkit-text-fill-color:var(--text);text-align:right;font-family:inherit;padding:0;font-variant-numeric:tabular-nums}
input[type="number"]:focus{outline:2px solid var(--blue);border-radius:3px;padding:0 3px;background:var(--bg);-webkit-text-fill-color:var(--text)}
input[type="number"]::-webkit-inner-spin-button{display:none}
.mw{display:flex;align-items:center;justify-content:flex-end;gap:1px;width:100%}
.mw .d{font-size:11px;color:var(--text3);flex-shrink:0;-webkit-text-fill-color:var(--text3)}
input[type="text"]{background:transparent;border:none;font-size:12px;color:var(--text);-webkit-text-fill-color:var(--text);font-family:inherit;width:100%}
input[type="text"]:focus{outline:none}
/* badges */
.badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}
.bg{background:#C0DD97;color:#27500A}.br{background:#F7C1C1;color:#791F1F}.bn{background:var(--bg2);color:var(--text2);border:1px solid var(--border2)}
@media(prefers-color-scheme:dark){.bg{background:#27500A;color:#97C459}.br{background:#501313;color:#F09595}}
/* del/imp btns */
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px 5px;font-size:12px;border-radius:3px;visibility:hidden;font-family:inherit}
tr:hover .del-btn{visibility:visible}.del-btn:hover{background:var(--bg3);color:var(--text)}
.imp-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--text3);padding:2px 5px;border-radius:3px;visibility:hidden;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:2px;flex-shrink:0;margin-left:2px}
tr:hover .imp-btn{visibility:visible}.imp-btn:hover{background:var(--blue);color:#fff}
.add-row-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:6px 10px 6px 20px;width:100%;text-align:left;display:flex;align-items:center;gap:4px;font-family:inherit;border-top:1px dashed var(--border)}
.add-row-btn:hover{color:var(--text);background:var(--bg2)}
/* src add picker */
.src-add-wrap{position:relative;display:inline-block}
.src-add-trigger{background:none;border:1px dashed var(--border2);border-radius:var(--r);cursor:pointer;font-size:11px;color:var(--text3);padding:5px 12px;display:inline-flex;align-items:center;gap:5px;font-family:inherit;transition:all .12s;margin:7px 10px}
.src-add-trigger:hover{color:var(--text);background:var(--bg2)}
.src-pick-drop{position:absolute;top:calc(100% + 4px);left:10px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:150;min-width:240px;max-height:300px;display:none;flex-direction:column}
.src-pick-drop.open{display:flex}
.src-pick-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.src-pick-search input{width:100%;background:transparent;border:none;font-size:12px;font-family:inherit;color:var(--text);-webkit-text-fill-color:var(--text);outline:none}
.src-pick-list{overflow-y:auto;max-height:180px}
.src-pick-item{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:12px;transition:background .1s}
.src-pick-item:hover{background:var(--bg2)}
.src-pick-new{border-top:1px solid var(--border);padding:7px 10px;display:flex;align-items:center;gap:6px}
.src-pick-new input{flex:1;background:transparent;border:none;font-size:12px;font-family:inherit;color:var(--text);-webkit-text-fill-color:var(--text);outline:none;padding:2px 4px;border-bottom:1px solid var(--border2)}
.src-pick-new input:focus{border-color:var(--blue)}
.src-pick-new-btn{background:var(--text);color:var(--bg);border:none;border-radius:5px;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
/* keywords */
.kw-section{margin-bottom:16px}
.section-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.kw-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kw-del-sel{font-size:11px;color:var(--accent);background:rgba(227,11,46,.08);border:1px solid rgba(227,11,46,.2);border-radius:var(--r);padding:4px 10px;cursor:pointer;font-family:inherit;display:none;align-items:center;gap:4px}
.kw-del-sel.show{display:inline-flex}.kw-del-sel:hover{background:rgba(227,11,46,.15)}
input[type="checkbox"]{accent-color:var(--blue);width:13px;height:13px;cursor:pointer;flex-shrink:0}
.kw-row-sel td{background:rgba(55,138,221,.06)!important}
.kw-imp-lbl{font-size:12px;color:var(--text2);background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:5px 12px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:4px;transition:all .15s}
.kw-imp-lbl:hover{background:var(--bg3)}
/* month comparison */
.month-cmp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.wk-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.wk-card-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px}
.wk-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px}
.wk-stat-lbl{color:var(--text3)}.wk-stat-val{font-weight:500}
/* src manager */
.sm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .15s}
.sm-overlay.open{opacity:1;pointer-events:auto}
.sm-modal{background:var(--bg);border:1px solid var(--border2);border-radius:var(--rl);width:420px;max-width:95vw;box-shadow:0 12px 40px rgba(0,0,0,.2);display:flex;flex-direction:column;max-height:80vh}
.sm-hdr{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sm-hdr-title{font-size:14px;font-weight:600}
.sm-close{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 4px;line-height:1;font-family:inherit}
.sm-list{overflow-y:auto;flex:1;padding:8px 0}
.sm-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border)}
.sm-row:last-child{border-bottom:none}.sm-row:hover{background:var(--bg2)}
.sm-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;position:relative;transition:transform .1s}
.sm-color-btn:hover{transform:scale(1.15)}.sm-color-btn.picking{border-color:var(--blue)}
.cpop{position:absolute;top:28px;left:0;background:var(--bg);border:1px solid var(--border2);border-radius:var(--r);padding:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);z-index:300;display:none;width:160px}
.cpop.open{display:block}
.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
.swatch:hover{transform:scale(1.2)}.swatch.on{border-color:var(--text)}
.sm-name-inp{flex:1;background:transparent;border:none;font-size:13px;color:var(--text);-webkit-text-fill-color:var(--text);font-family:inherit;padding:0}
.sm-name-inp:focus{outline:none;border-bottom:1px solid var(--blue)}
.sm-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:3px 6px;border-radius:4px;opacity:0;font-family:inherit}
.sm-row:hover .sm-del{opacity:1}.sm-del:hover{background:var(--bg3);color:var(--text)}
.sm-add-area{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.sm-add-row{display:flex;align-items:center;gap:8px}
.sm-add-inp{flex:1;font-size:13px;font-family:inherit;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;color:var(--text);-webkit-text-fill-color:var(--text);outline:none}
.sm-add-inp:focus{border-color:var(--blue)}
.sm-add-color{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;flex-shrink:0;transition:transform .1s;position:relative}
.sm-add-color:hover{transform:scale(1.1)}.sm-add-color.picking{border-color:var(--blue)}
.sm-add-btn{font-size:12px;font-family:inherit;background:var(--text);color:var(--bg);border:none;border-radius:var(--r);padding:6px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.sm-add-btn:hover{opacity:.85}
/* toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--bg);font-size:12px;padding:10px 16px;border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:500;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.muted{color:var(--text3);font-size:11px}
.footer{text-align:center;font-size:11px;color:var(--text3);padding:14px 0 6px}
@media print{
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hdr .hdr-right,.period-row,.src-nav{display:none!important}
  .page{display:block!important}
  .card{border:1px solid #ddd}
  .tw{overflow:visible}
  table{font-size:10px}
  input{pointer-events:none}
  .mw .d{color:#555;-webkit-text-fill-color:#555}
  .bg{background:#d4edba!important;color:#235009!important}
  .br{background:#fdd!important;color:#700!important}
  @page{margin:12mm;size:A4 landscape}
}

/* ── Finance / Housecall page ── */
.hc-upload-zone{border:2px dashed var(--border2);border-radius:var(--rl);padding:28px;text-align:center;margin-bottom:18px;transition:all .15s;cursor:pointer}
.hc-upload-zone:hover,.hc-upload-zone.drag{border-color:var(--blue);background:rgba(55,138,221,0.04)}
.hc-upload-zone input{display:none}
.hc-upload-icon{font-size:28px;margin-bottom:8px}
.hc-upload-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.hc-upload-sub{font-size:11px;color:var(--text3)}
.hc-loaded{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:var(--r);margin-bottom:18px;border:1px solid var(--border)}
.hc-loaded-info{font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px}
.hc-loaded-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.hc-clear{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);font-family:inherit;padding:3px 8px;border-radius:4px}
.hc-clear:hover{background:var(--bg3);color:var(--text)}
.funnel-steps{display:flex;align-items:stretch;gap:0;margin-bottom:18px;overflow-x:auto}
.funnel-step{flex:1;min-width:110px;background:var(--bg2);border:1px solid var(--border);padding:12px 10px;text-align:center;position:relative}
.funnel-step:first-child{border-radius:var(--r) 0 0 var(--r)}
.funnel-step:last-child{border-radius:0 var(--r) var(--r) 0}
.funnel-step:not(:last-child)::after{content:'→';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);z-index:1;background:var(--bg);padding:0 2px}
.funnel-step-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.funnel-step-val{font-size:18px;font-weight:600;color:var(--text);line-height:1}
.funnel-step-sub{font-size:10px;color:var(--text3);margin-top:3px}
.funnel-step.active{background:rgba(55,138,221,0.08);border-color:var(--blue)}
.src-finance-grid{display:grid;gap:1px;background:var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:18px}
.src-finance-row{display:grid;grid-template-columns:160px repeat(13,1fr);background:var(--bg);align-items:center}
.src-finance-row.head{background:var(--bg2);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.src-finance-cell{padding:9px 10px;font-size:12px}
.src-finance-cell.r{text-align:right}
.src-finance-cell.bold{font-weight:600}
.src-finance-row:hover .src-finance-cell{background:var(--bg2)}

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────
const SRC_COLORS={Yelp:'#D4537E','Google Ads':'#BA7517','Facebook Ads':'#534AB7',Thumbtack:'#7F77DD',LSA:'#1D9E75',Google:'#378ADD','Online Booking':'#1D9E75','Reserve with Google':'#639922',Regular:'#888780',Recommendation:'#E24B4A'};
const POOL=['#D4537E','#378ADD','#1D9E75','#BA7517','#7F77DD','#534AB7','#639922','#E24B4A','#888780'];
const COLOR_PALETTE=['#E30B2E','#D4537E','#378ADD','#534AB7','#7F77DD','#1D9E75','#639922','#BA7517','#EF9F27','#E24B4A','#888780','#2563EB','#7C3AED','#0F6E56','#993C1D','#111'];
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TAB_SOURCES=['Google Ads','Facebook Ads','Yelp','Thumbtack','LSA','Reserve with Google','Online Booking','Regular','Recommendation'];
const HC_SRC_MAP={'google':'Google','google ads':'Google Ads','yelp':'Yelp','thumbtack':'Thumbtack','facebook':'Facebook Ads','facebook ads':'Facebook Ads','lsa':'LSA','local services':'LSA','regular':'Regular','recommendation':'Recommendation','referral':'Recommendation','online booking':'Online Booking','reserve with google':'Reserve with Google'};
function srcColor(n,i,custom){return custom||SRC_COLORS[n]||POOL[i%POOL.length]}

// ─── DATA ─────────────────────────────────────────────────────────
// months[monthKey] = [ source, ... ]  ← no week level
// source = { id, name, color, open, campaigns[], keywords[] }
// campaign = { id, name, impressions, clicks, leads, scheduled, adCost, revenue, cogs }
// keyword  = { id, keyword, matchType, impressions, clicks, ctr, cpc, conversions, cost, position }
let months, selMonths, viewMode, curMonth, tableView, curPage, nid=1;
let hcData = null; // Housecall Pro imported jobs
function mkId(){return nid++}
function mkCamp(name='Кампания',p={}){return{id:mkId(),name,...{impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0},...p}}
function mkKw(kw='',p={}){return{id:mkId(),keyword:kw,...{matchType:'Exact',impressions:0,clicks:0,ctr:0,cpc:0,conversions:0,cost:0,position:0},...p}}
function mkSrc(name,camps,kws,color){return{id:mkId(),name,color:color||'',open:false,campaigns:camps||[mkCamp()],keywords:kws||[]}}

// ─── CALC ─────────────────────────────────────────────────────────
function calcCamp(c){
  const imp=c.impressions||0,clk=c.clicks||0,lds=c.leads||0,sch=c.scheduled||0;
  const spend=c.adCost||0,rev=c.revenue||0,cogs=c.cogs||0;
  return{impressions:imp,clicks:clk,leads:lds,scheduled:sch,adCost:spend,revenue:rev,cogs,
    ctr:imp>0?+(clk/imp*100).toFixed(2):null,
    clickToLead:clk>0?+(lds/clk*100).toFixed(1):null,
    leadToSched:lds>0?Math.round(sch/lds*100):null,
    cpc:clk>0&&spend>0?Math.round(spend/clk):null,
    cpl:lds>0&&spend>0?Math.round(spend/lds):null,
    cpb:sch>0&&spend>0?Math.round(spend/sch):null,
    avgJobVal:sch>0&&rev>0?Math.round(rev/sch):null,
    grossProfit:rev-cogs,
    roas:spend>0&&rev>0?+(rev/spend).toFixed(2):null,
    adROI:spend>0?Math.round((rev-spend)/spend*100):null,
    grossROI:(spend>0&&rev>0)?Math.round((rev-cogs-spend)/spend*100):null}
}
function sumSrc(src){
  const s={impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0};
  src.campaigns.forEach(c=>{s.impressions+=c.impressions||0;s.clicks+=c.clicks||0;s.leads+=c.leads||0;s.scheduled+=c.scheduled||0;s.adCost+=c.adCost||0;s.revenue+=c.revenue||0;s.cogs+=c.cogs||0});
  return calcCamp(s)
}

// ─── AGGREGATE ────────────────────────────────────────────────────
function sortMK(keys){
  return[...keys].sort((a,b)=>{const pa=a.split(' '),pb=b.split(' ');const ya=+pa[1],yb=+pb[1];return ya!==yb?ya-yb:MN.indexOf(pa[0])-MN.indexOf(pb[0])})
}
function aggregateSrcs(srcArrays){
  if(!srcArrays.length)return[];
  const map={};const order=srcArrays[0].map(s=>s.name);
  srcArrays.forEach(sources=>{
    sources.forEach(src=>{
      if(!map[src.name])map[src.name]={id:src.id,name:src.name,color:src.color||'',open:src.open,campaigns:{},keywords:[],_f:{impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0}};
      const ss=sumSrc(src);const mf=map[src.name]._f;
      ['impressions','clicks','leads','scheduled','adCost','revenue','cogs'].forEach(k=>mf[k]+=(ss[k]||0));
      src.campaigns.forEach(c=>{
        if(!map[src.name].campaigns[c.name])map[src.name].campaigns[c.name]={id:c.id,name:c.name,impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0};
        const mc=map[src.name].campaigns[c.name];
        ['impressions','clicks','leads','scheduled','adCost','revenue','cogs'].forEach(k=>mc[k]+=(c[k]||0))
      });
      src.keywords.forEach(kw=>{
        const ex=map[src.name].keywords.find(k=>k.keyword===kw.keyword&&k.matchType===kw.matchType);
        if(ex){ex.impressions+=kw.impressions||0;ex.clicks+=kw.clicks||0;ex.cost+=kw.cost||0;ex.conversions+=kw.conversions||0}
        else map[src.name].keywords.push({...kw,id:mkId()})
      })
    })
  });
  return order.filter(n=>map[n]).map(n=>{
    const m=map[n];
    return{id:m.id,name:m.name,color:m.color,open:m.open,keywords:m.keywords,_agg:calcCamp(m._f),
      campaigns:Object.values(m.campaigns).map(c=>({...c,...calcCamp(c)}))}
  })
}

function getSrcs(){
  if(viewMode==='month') return months[curMonth]||[];
  const arrs=[];sortMK([...selMonths]).forEach(mk=>{if(months[mk])arrs.push(months[mk])});
  return aggregateSrcs(arrs)
}
function isRo(){return viewMode!=='month'}
function curSrcs(){return months[curMonth]||[]}
function findSrc(sid){return curSrcs().find(s=>s.id===sid)}
function findCamp(sid,cid){return findSrc(sid)?.campaigns.find(c=>c.id===cid)}

    mkSrc('LSA',[mkCamp('Local Services',{impressions:8600,clicks:0,leads:14,scheduled:10,adCost:830,revenue:7200,cogs:3400})],[]),
    mkSrc('Google',[mkCamp('Organic SEO',{impressions:0,clicks:0,leads:14,scheduled:15,adCost:0,revenue:11538,cogs:5400})],[]),
    mkSrc('Reserve with Google',[mkCamp('Reserve with Google',{impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0})],[]),
    mkSrc('Online Booking',[mkCamp('Online Booking',{impressions:0,clicks:0,leads:0,scheduled:0,adCost:0,revenue:0,cogs:0})],[]),
    mkSrc('Regular',[mkCamp('Regular clients',{impressions:0,clicks:0,leads:74,scheduled:74,adCost:0,revenue:34906,cogs:16400})],[]),
    mkSrc('Recommendation',[mkCamp('Word of mouth',{impressions:0,clicks:0,leads:3,scheduled:3,adCost:0,revenue:12532,cogs:5900})],[]),
  ]
}

function load(){
  try{
    const s=localStorage.getItem('fuse_v7');
    if(s){const p=JSON.parse(s);months=p.m;selMonths=new Set(p.sm);viewMode=p.vm||'month';curMonth=p.cm;tableView=p.tv||'funnel';curPage=p.cp||'overview';nid=p.nid||500;hcData=null;}
    else initDefault();
    migrateSrcs();
  }catch(e){initDefault()}
}

// ensure new default sources exist in all months
function migrateSrcs(){
  const defaults=makeDefaultSrcs();
  Object.keys(months).forEach(mk=>{
    defaults.forEach(def=>{
      if(!months[mk].find(s=>s.name===def.name)){
        months[mk].push(mkSrc(def.name,def.campaigns.map(c=>mkCamp(c.name)),[],def.color));
      }
    });
  });
}
function initDefault(){
  months={'Jan 2026':makeDefaultSrcs()};
  selMonths=new Set(['Jan 2026']);viewMode='month';curMonth='Jan 2026';tableView='funnel';curPage='overview'
}
function save(){
  try{
    localStorage.setItem('fuse_v7',JSON.stringify({m:months,sm:[...selMonths],vm:viewMode,cm:curMonth,tv:tableView,cp:curPage,nid}));
    document.getElementById('saveDot').style.background='#639922';
    document.getElementById('saveLbl').textContent='Сохранено'
  }catch(e){}
}

const fmt=n=>(n||n===0)?Math.round(n).toLocaleString('en-US'):'—';
const fmtD=n=>n?'$'+fmt(n):'—';
function badge(v,good,bad){if(v===null||v===undefined)return'<span class="muted">—</span>';return`<span class="badge ${v>=good?'bg':v<bad?'br':'bn'}">${v}%</span>`}
function roiBadge(v){if(v===null||v===undefined)return'<span class="muted">—</span>';return`<span class="badge ${v>=100?'bg':v<0?'br':'bn'}">${v}%</span>`}
function ni(sid,cid,f,v){return`<input type="number" value="${v||0}" onchange="updCamp(${sid},${cid},'${f}',this.value)" onfocus="this.select()">`}
function niM(sid,cid,f,v){return`<div class="mw"><span class="d">$</span><input type="number" value="${v||0}" onchange="updCamp(${sid},${cid},'${f}',this.value)" onfocus="this.select()"></div>`}

        ${!ro?`<td><div class="cell"><button class="del-btn" data-delkw="${kw.id}" data-src="${sid}">✕</button></div></td>`:''}
      </tr>`;
    });
  }
  html+='</tbody></table></div></div></div>';
  return html
}

  return Object.values(map)
}
function syncSrcColor(name,color){Object.values(months).forEach(srcs=>srcs.forEach(s=>{if(s.name===name)s.color=color}))}
function syncSrcName(oldN,newN){Object.values(months).forEach(srcs=>srcs.forEach(s=>{if(s.name===oldN)s.name=newN}))}
function deleteSrcGlobal(name){Object.keys(months).forEach(mk=>{months[mk]=months[mk].filter(s=>s.name!==name)})}
function addSrcGlobal(name,color){
  Object.values(months).forEach(srcs=>{if(!srcs.find(s=>s.name===name))srcs.push(mkSrc(name,[mkCamp()],[],color))})
}

// ─── CSV IMPORT ───────────────────────────────────────────────────
function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#E30B2E':'var(--text)';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
function parseMoney(s){return parseFloat((s||'').toString().replace(/[$,\s]/g,''))||0}
function parseCampCSV(text){
  const lines=text.trim().split('\n').filter(l=>l.trim());if(lines.length<2)return null;
  const first=lines[0];const delim=(first.match(/\t/g)||[]).length>(first.match(/,/g)||[]).length?'\t':',';
  function split(line){if(delim==='\t')return line.split('\t').map(s=>s.trim());const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;continue}if(c===','&&!inQ){res.push(cur.trim());cur='';continue}cur+=c}res.push(cur.trim());return res}
  const headers=split(lines[0]).map(h=>h.replace(/^\uFEFF/,'').trim());const rows=[];
  for(let i=1;i<lines.length;i++){const vals=split(lines[i]);const obj={};headers.forEach((h,idx)=>{obj[h]=(vals[idx]||'').trim()});rows.push(obj)}
  return{headers,rows}
}
function detectFmt(headers){
  const h=headers.join('|').toLowerCase();
  if(h.includes('time period')||h.includes('billed ad impressions')||h.includes('rax and mtb'))return'yelp_camp';
  if(h.includes('search term')&&h.includes('billed ad clicks'))return'yelp_kw';
  if(h.includes('date of contact')||h.includes('net cost')&&h.includes('job status')&&h.includes('lead cost'))return'thumbtack';
  if(h.includes('date')&&h.includes('cost')&&h.includes('clicks')&&!h.includes('ad set'))return'google_ts';
  if(h.includes('ad set name')||h.includes('amount spent'))return'facebook';
  if(h.includes('search keyword')||h.includes('keyword')&&h.includes('match type'))return'google_kw';
  if(h.includes('campaign')&&h.includes('clicks'))return'google_camp';
  if(h.includes('keyword')&&(h.includes('impressions')||h.includes('clicks')))return'generic_kw';
  return'unknown'
}
function campImportCSV(input){
  const campId=+input.dataset.campid,srcId=+input.dataset.srcid;
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{try{const r=applyCampCSV(e.target.result,campId,srcId);if(r.ok){renderAllPages();save();showToast('✓ '+r.msg)}else showToast(r.msg,true)}catch(err){showToast('Ошибка: '+err.message,true)}};
  reader.readAsText(file)
}
function applyCampCSV(text,campId,srcId){
  const parsed=parseCampCSV(text);if(!parsed)return{ok:false,msg:'Пустой CSV'};
  const{headers,rows}=parsed;const fmt2=detectFmt(headers);
  const src=(months[curMonth]||[]).find(s=>s.id===srcId);if(!src)return{ok:false,msg:'Источник не найден'};

  // keyword import
  if(fmt2==='yelp_kw'||fmt2==='google_kw'||fmt2==='generic_kw'){
    return applyKwCSVData(rows,fmt2,src)
  }

  const camp=src.campaigns.find(c=>c.id===campId);if(!camp)return{ok:false,msg:'Кампания не найдена'};
  let tI=0,tC=0,tSp=0,tL=0,tConv=0;
  if(fmt2==='thumbtack'){
    let tLeads=0,tSched=0,tSpend=0,tRefund=0;
    rows.forEach(r=>{
      tLeads++;
      const status=(r['Job Status']||'').trim();
      if(status==='Scheduled'||status==='Job done')tSched++;
      const cost=parseMoney(r['Net Cost']||r['Lead Cost']||0);
      const refunded=(r['Refunded']||'').toLowerCase();
      if(refunded==='yes'||refunded==='true'||refunded==='1')tRefund+=cost;
      else tSpend+=cost;
    });
    camp.leads=tLeads;
    camp.adCost=Math.round(tSpend*100)/100;
    // scheduled comes only from Housecall import
    return{ok:true,msg:`Thumbtack: ${tLeads} лидов, $${camp.adCost} spend (refunds excluded)`}
  }
  if(fmt2==='google_ts'){rows.forEach(r=>{tI+=+r['Impressions']||0;tC+=+r['Clicks']||0;tSp+=parseMoney(r['Cost']);tConv+=parseFloat(r['Conversions'])||0});camp.impressions=tI;camp.clicks=tC;camp.adCost=Math.round(tSp*100)/100;camp.leads=Math.round(tConv);return{ok:true,msg:`Google Ads: $${camp.adCost} spend, ${camp.impressions} имп.`}}
  if(fmt2==='facebook'){rows.forEach(r=>{tI+=+r['Impressions']||0;tSp+=parseMoney(r['Amount spent (USD)']||r['Amount spent']);tL+=+r['Results']||0;tC+=+r['Clicks (all)']||+r['Link clicks']||0});camp.impressions=tI;camp.adCost=Math.round(tSp*100)/100;camp.leads=tL;if(tC)camp.clicks=tC;return{ok:true,msg:`Facebook: $${camp.adCost} spend, ${camp.impressions} имп., ${camp.leads} лидов`}}
  if(fmt2==='yelp_camp'){
    function col(keys){for(const k of Object.keys(rows[0])){if(keys.some(q=>k.toLowerCase().includes(q.toLowerCase())))return rows[0][k]||'0'}return'0'}
    rows.forEach(r=>{tI+=+col(['Billed Ad Impressions','Delivered Ad Impressions'])||0;tC+=+col(['Billed Ad Clicks','Ad Clicks'])||0;tSp+=parseMoney(col(['Ad Costs','Ad Cost']))});
    tL=+col(['Total Number of Ad Driven Leads','Ad Driven Leads'])||0;
    camp.impressions=tI;camp.clicks=tC;camp.adCost=Math.round(tSp*100)/100;camp.leads=tL;
    // scheduled comes only from Housecall import
    return{ok:true,msg:`Yelp: $${camp.adCost} spend, ${camp.impressions} имп., ${camp.leads} лидов`}
  }
  return{ok:false,msg:'Формат не распознан'}
}
function kwImportCSV(input){
  const sid=+input.dataset.kwsrcid;const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=e=>{try{const parsed=parseCampCSV(e.target.result);if(!parsed){showToast('Пустой CSV',true);return}const fmt2=detectFmt(parsed.headers);const src=findSrc(sid);if(!src){showToast('Источник не найден',true);return}const r=applyKwCSVData(parsed.rows,fmt2,src);if(r.ok){renderAllPages();save();showToast('✓ '+r.msg)}else showToast(r.msg,true)}catch(err){showToast('Ошибка: '+err.message,true)}};
  reader.readAsText(file)
}
function applyKwCSVData(rows,fmt2,src){
  if(fmt2==='unknown')return{ok:false,msg:'Формат не распознан. Нужны колонки: Search Term или Keyword + Impressions/Clicks'};
  let added=0,updated=0;
  rows.forEach(row=>{
    let kw='',imp=0,clk=0,cost=0,cpc=0,conv=0,pos=0,mt='N/A';
    if(fmt2==='yelp_kw'){
      kw=row['Search Term']||row['search term']||'';imp=+row['Delivered Ad Impressions']||0;clk=+row['Billed Ad Clicks']||0;
      cost=parseMoney(row['Ad Costs']||row['Ad Cost']||0);const cpcRaw=row['Average Cost Per Click']||'0';
      cpc=cpcRaw==='nan'||cpcRaw===''?0:parseMoney(cpcRaw);conv=+row['Total Number of Ad Driven Leads']||0;mt='N/A'
    } else if(fmt2==='google_kw'){
      kw=row['Search keyword']||row['Keyword']||'';mt=row['Match type']||'Broad';imp=+row['Impressions']||0;clk=+row['Clicks']||0;
      cost=parseMoney(row['Cost']||0);conv=parseFloat(row['Conversions']||0)||0;pos=parseFloat(row['Avg. position']||0)||0;
      cpc=clk>0&&cost>0?Math.round(cost/clk*100)/100:0
    } else {
      for(const k of Object.keys(row)){const kl=k.toLowerCase();if(kl==='keyword'||kl==='search term')kw=row[k];if(kl.includes('impression'))imp=+row[k]||0;if(kl==='clicks'||kl==='billed ad clicks')clk=+row[k]||0;if(kl.includes('cost')&&!kl.includes('per'))cost=parseMoney(row[k]);if(kl.includes('per click'))cpc=parseMoney(row[k]);if(kl.includes('conv')||kl.includes('lead'))conv=+row[k]||0}
    }
    if(!kw||kw==='—')return;
    const ctr=imp>0&&clk>0?+(clk/imp*100).toFixed(2):0;
    const existing=src.keywords.find(k=>k.keyword.toLowerCase()===kw.toLowerCase()&&k.matchType===mt);
    if(existing){existing.impressions+=imp;existing.clicks+=clk;existing.cost+=cost;existing.conversions+=conv;existing.cpc=existing.clicks>0&&existing.cost>0?Math.round(existing.cost/existing.clicks*100)/100:existing.cpc;existing.ctr=existing.impressions>0&&existing.clicks>0?+(existing.clicks/existing.impressions*100).toFixed(2):0;updated++}
    else{src.keywords.push(mkKw(kw,{matchType:mt,impressions:imp,clicks:clk,ctr,cpc,conversions:conv,cost,position:pos}));added++}
  });
  return{ok:true,msg:`Keywords: +${added} новых, ${updated} обновлено → ${src.name}`}
}

function parseHousecallCSV(text){
  // Full RFC-4180 parser — handles newlines inside quoted fields (e.g. Notes column)
  text = text.replace(/^\uFEFF/, ''); // strip BOM
  const rows = [];
  let i = 0, n = text.length;

  function parseField(){
    if(i >= n) return '';
    if(text[i] === '"'){
      // quoted field
      i++; // skip opening quote
      let val = '';
      while(i < n){
        if(text[i] === '"'){
          if(i+1 < n && text[i+1] === '"'){ val += '"'; i += 2; } // escaped quote
          else { i++; break; } // closing quote
        } else {
          val += text[i++];
        }
      }
      return val;
    } else {
      // unquoted field — read until comma or newline
      let val = '';
      while(i < n && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r'){
        val += text[i++];
      }
      return val.trim();
    }
  }

  function parseRow(){
    const fields = [];
    while(i < n && text[i] !== '\n' && text[i] !== '\r'){
      fields.push(parseField());
      if(i < n && text[i] === ',') i++; // skip comma
    }
    // skip \r\n or \n
    if(i < n && text[i] === '\r') i++;
    if(i < n && text[i] === '\n') i++;
    return fields;
  }

  if(i >= n) return null;
  const headers = parseRow();
  while(i < n){
    // skip blank lines
    if(text[i] === '\n' || text[i] === '\r'){ if(text[i]==='\r')i++; i++; continue; }
    const vals = parseRow();
    if(vals.every(v=>!v)) continue; // skip fully empty rows
    const obj = {};
    headers.forEach((h,idx)=>{ obj[h] = (vals[idx]||'').trim(); });
    rows.push(obj);
  }
  return rows.length ? rows : null;
}

function parseMoney2(s){ return parseFloat((s||'').replace(/[$,\s]/g,''))||0; }

function importHousecall(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const rows = parseHousecallCSV(e.target.result);
      if(!rows||!rows.length){ showToast('Не удалось прочитать CSV', true); return; }

      // Validate it's Housecall format
      const h = Object.keys(rows[0]).join('|').toLowerCase();
      if(!h.includes('job status')&&!h.includes('job revenue')&&!h.includes('job lead source')){
        showToast('Неверный формат. Нужен экспорт Jobs из Housecall Pro', true); return;
      }

      hcData = rows
        .filter(r => r['Job #'] && r['Job #'].toString().trim() !== '') // skip summary/total rows
        .map(r=>({
          jobNum:     r['Job #']||'',
          status:     r['Job status']||'',
          type:       r['Job type']||'',
          leadSrc:    r['Job lead source']||r['Customer lead source']||'Unknown',
          revenue:    parseMoney2(r['Job revenue']),
          amount:     parseMoney2(r['Job amount']),
          paid:       parseMoney2(r['Paid amount']),
          createdAt:  r['Job created date']||'',
          completedAt:r['Job completed date']||'',
          customer:   r['Customer name']||'',
          city:       r['City']||'',
        }));

      // ── sync revenue per month per source ───────────────────────
      // Build: { monthKey: { srcName: revenue } }
      const revByMonthSrc = {};
      hcData.forEach(j=>{
        const ds = j.createdAt || j.completedAt;
        let mk = null;
        if(ds){ try{ const d=new Date(ds); mk=MN[d.getMonth()]+' '+d.getFullYear(); }catch(e){} }
        if(!mk) return; // skip jobs with no date
        const srcName = normSrc(j.leadSrc);
        if(!revByMonthSrc[mk]) revByMonthSrc[mk]={};
        revByMonthSrc[mk][srcName] = (revByMonthSrc[mk][srcName]||0) + j.revenue;
      });
      // booked jobs count per month per source (all jobs in HCP = booked)
      const schedByMonthSrc = {};
      hcData.forEach(j=>{
        const ds = j.createdAt || j.completedAt;
        let mk = null;
        if(ds){ try{ const d=new Date(ds); mk=MN[d.getMonth()]+' '+d.getFullYear(); }catch(e){} }
        if(!mk) return;
        const srcName = normSrc(j.leadSrc);
        if(!schedByMonthSrc[mk]) schedByMonthSrc[mk]={};
        schedByMonthSrc[mk][srcName] = (schedByMonthSrc[mk][srcName]||0) + 1;
      });

      // For each month in the data — create if missing, then write revenue
      const updated = [];
      Object.entries(revByMonthSrc).forEach(([mk, revBySrc])=>{
        const schedBySrc = schedByMonthSrc[mk] || {};
        // create month if not exists
        if(!months[mk]){
          const ks = sortMK(Object.keys(months));
          const srcTemplate = ks.length ? months[ks[ks.length-1]] : null;
          months[mk] = (srcTemplate||[]).map(s=>mkSrc(s.name,s.campaigns.map(c=>mkCamp(c.name)),[],s.color));
          if(!months[mk].length) months[mk] = makeDefaultSrcs();
          migrateSrcs();
          selMonths.add(mk);
        }
        // write revenue and scheduled to source campaigns
        // revenue goes to first campaign only (HCP doesn't track per-campaign)
        // first reset all campaigns revenue to 0 to avoid stale data
        (months[mk]||[]).forEach(src=>{
          if(revBySrc[src.name] !== undefined){
            // reset all campaigns revenue first
            src.campaigns.forEach(c=>{ c.revenue=0; c.scheduled=0; });
            // write total to first campaign
            if(src.campaigns.length > 0){
              src.campaigns[0].revenue   = Math.round(revBySrc[src.name]*100)/100;
              src.campaigns[0].scheduled = schedBySrc[src.name] || 0;
            }
            if(!updated.includes(src.name)) updated.push(src.name);
          }
        });
      });

      save();
      renderAllPages();
      curPage='finance';
      renderAllPages();
      const updMsg = updated.length ? ` · Revenue обновлён: ${updated.join(', ')}` : '';
      showToast(`✓ Загружено ${hcData.length} jobs из Housecall Pro${updMsg}`);
    } catch(err){ showToast('Ошибка: '+err.message, true); }
  };
  reader.readAsText(file);
}

// ── FINANCE PAGE RENDERER ─────────────────────────────────────────
function renderFinancePage(){
  const el = document.getElementById('page-finance');
  if(!el) return;

  if(!hcData){
    el.innerHTML = `
    <div class="hc-upload-zone" id="hcDropZone" onclick="document.getElementById('hcFileInput').click()">
      <input type="file" id="hcFileInput" accept=".csv" style="display:none">
      <div class="hc-upload-icon">📋</div>
      <div class="hc-upload-title">Загрузить отчёт Housecall Pro</div>
      <div class="hc-upload-sub">Jobs export CSV · перетащи сюда или кликни</div>
    </div>
    <div style="padding:32px;text-align:center;color:var(--text3);font-size:13px">
      Загрузи экспорт Jobs из Housecall Pro для сквозной аналитики.<br><br>
      <strong style="color:var(--text)">Как экспортировать:</strong> Housecall Pro → Jobs → Export → All jobs CSV
    </div>`;
    document.getElementById('hcFileInput').addEventListener('change',function(){if(this.files[0])importHousecall(this.files[0])});
    setupDropZone('hcDropZone');
    return;
  }

  // ── compute analytics ────────────────────────────────────────
  // Filter jobs by selected months
  const jobs = hcData.filter(j=>{
    const ds = j.createdAt || j.completedAt;
    if(!ds) return false;
    try{
      const d = new Date(ds);
      const mk = MN[d.getMonth()] + ' ' + d.getFullYear();
      return viewMode==='all' ? true : selMonths.has(mk);
    }catch(e){ return false; }
  });
  const totalJobs = jobs.length;
  // totalRevenue from hcData (for funnel/job counts)
  const totalRevenueHC = jobs.reduce((s,j)=>s+j.revenue,0);

  // by source
  const bySource = {};
  jobs.forEach(j=>{
    const src = normSrc(j.leadSrc);
    if(!bySource[src]) bySource[src]={jobs:0,revenue:0,hcRevenue:0,amount:0,types:{}};
    bySource[src].jobs++;
    bySource[src].hcRevenue += j.revenue; // actual revenue from filtered HCP jobs
    bySource[src].revenue   += j.revenue;
    bySource[src].amount    += j.amount;
    bySource[src].types[j.type||'Other']=(bySource[src].types[j.type||'Other']||0)+1;
  });

  // by type
  const byType = {};
  jobs.forEach(j=>{const t=j.type||'Other';if(!byType[t])byType[t]={jobs:0,revenue:0};byType[t].jobs++;byType[t].revenue+=j.revenue});

  // by month
  const byMonth = {};
  jobs.forEach(j=>{
    const ds = j.createdAt||j.completedAt;
    let mk='Unknown';
    if(ds){try{const d=new Date(ds);mk=MN[d.getMonth()]+' '+d.getFullYear()}catch(e){}}
    if(!byMonth[mk])byMonth[mk]={jobs:0,revenue:0};
    byMonth[mk].jobs++;byMonth[mk].revenue+=j.revenue;
  });

  // Get dashboard sources aggregated across ALL months present in hcData
  // so spend and revenue always align with the jobs being shown
  const hcMonthKeys = new Set();
  jobs.forEach(j=>{
    const ds=j.completedAt||j.createdAt;
    if(ds){try{const d=new Date(ds);hcMonthKeys.add(MN[d.getMonth()]+' '+d.getFullYear())}catch(e){}}
  });
  // aggregate sources from hcData months that exist in dashboard
  const hcMonthArrays=[];
  hcMonthKeys.forEach(mk=>{ if(months[mk]) hcMonthArrays.push(months[mk]); });
  const dashSrcs = hcMonthArrays.length ? aggregateSrcs(hcMonthArrays) : getSrcs();

  function getSpend(srcName){
    const s=dashSrcs.find(s=>s.name===srcName);
    return s?(s._agg||sumSrc(s)).adCost:0;
  }
  function getDashRev(srcName){
    // Revenue from filtered jobs (matches selected month) — source of truth
    return (bySource[srcName]||{}).hcRevenue || 0;
  }

  const sortedSources = Object.entries(bySource).sort((a,b)=>b[1].revenue-a[1].revenue);
  const totalSpend = sortedSources.reduce((s,[name,_])=>s+getSpend(name),0);
  // totalRevenue from dashboard sources (aligned with spend)
  // Use HCP filtered jobs revenue as the source of truth
  const totalRevenue = totalRevenueHC;
  const avgJobVal = totalJobs>0?totalRevenue/totalJobs:0;

  // ── funnel steps ─────────────────────────────────────────────
  // leads from dashboard
  const totalLeads = dashSrcs.reduce((s,src)=>s+(src._agg||sumSrc(src)).leads,0);
  const totalScheduled = dashSrcs.reduce((s,src)=>s+(src._agg||sumSrc(src)).scheduled,0);
  const completedJobs = jobs.filter(j=>j.status==='Completed').length;

  const funnelHtml = `
  <div class="funnel-steps">
    <div class="funnel-step">
      <div class="funnel-step-lbl">Leads</div>
      <div class="funnel-step-val">${fmt(totalLeads)}</div>
      <div class="funnel-step-sub">из дашборда</div>
    </div>

    <div class="funnel-step active">
      <div class="funnel-step-lbl">Jobs (HCP)</div>
      <div class="funnel-step-val">${fmt(totalJobs)}</div>
      <div class="funnel-step-sub">${totalLeads>0?Math.round(totalJobs/totalLeads*100):0}% от лидов</div>
    </div>
    <div class="funnel-step active">
      <div class="funnel-step-lbl">Completed</div>
      <div class="funnel-step-val">${fmt(completedJobs)}</div>
      <div class="funnel-step-sub">${totalJobs>0?Math.round(completedJobs/totalJobs*100):0}% от jobs</div>
    </div>
    <div class="funnel-step">
      <div class="funnel-step-lbl">Revenue</div>
      <div class="funnel-step-val">$${fmt(totalRevenue)}</div>
      <div class="funnel-step-sub">avg $${fmt(avgJobVal)}/job</div>
    </div>
  </div>`;

  // ── KPIs ─────────────────────────────────────────────────────
  const grossROI = totalSpend>0?Math.round((totalRevenue-totalSpend)/totalSpend*100):null;
  const roas = totalSpend>0?+(totalRevenue/totalSpend).toFixed(2):null;
  const cpj = totalJobs>0&&totalSpend>0?Math.round(totalSpend/totalJobs):null;

  const kpiHtml = `<div class="kpi-row c4" style="margin-bottom:18px">
    <div class="kpi green"><div class="kpi-lbl">Revenue (HCP)</div><div class="kpi-val">$${fmt(totalRevenue)}</div><div class="kpi-sub">${totalJobs} jobs · avg $${fmt(Math.round(avgJobVal))}</div></div>
    <div class="kpi blue"><div class="kpi-lbl">Ad Spend</div><div class="kpi-val">$${fmt(totalSpend)}</div><div class="kpi-sub">из дашборда (платные каналы)</div></div>
    <div class="kpi ${grossROI>=100?'green':grossROI<0?'accent':''}"><div class="kpi-lbl">ROAS</div><div class="kpi-val">${roas!==null?roas+'x':'—'}</div><div class="kpi-sub">Revenue / Ad Spend</div></div>
    <div class="kpi"><div class="kpi-lbl">Cost per Job</div><div class="kpi-val">${cpj!==null?'$'+fmt(cpj):'—'}</div><div class="kpi-sub">Spend / Jobs completed</div></div>
  </div>`;

  // ── Source breakdown table (full ROI report) ─────────────────
  // columns: Revenue | ROI% | Spend | Leads | CPL | Comp. Jobs | CP Comp. | Ld→Comp% | Jobs Sold | Sale Conv% | Cost/Sold | Impr | Clicks | CPC | Click→Lead% | Lead→Job%
  let srcRows = '';

  // totals accumulators
  let totRev=0,totSpend=0,totLeads=0,totBooked=0,totSold=0,totImpr=0,totClicks=0;

  sortedSources.forEach(([srcName, d])=>{
    const spend   = getSpend(srcName);
    const dashSrc = dashSrcs.find(s=>s.name===srcName);
    const dashRev = getDashRev(srcName);
    const rev     = dashRev || d.revenue;

    // leads & booked from dashboard
    const dsLeads   = dashSrc?(dashSrc._agg||sumSrc(dashSrc)).leads:0;
    const dsBooked  = dashSrc?(dashSrc._agg||sumSrc(dashSrc)).scheduled:0;
    const dsImpr    = dashSrc?(dashSrc._agg||sumSrc(dashSrc)).impressions:0;
    const dsClicks  = dashSrc?(dashSrc._agg||sumSrc(dashSrc)).clicks:0;
    const leads     = dsLeads  || d.jobs; // fallback to hcp jobs count
    const booked    = dsBooked || d.jobs;
    const sold      = d.jobs;  // jobs from HCP = actually sold/completed
    const impr      = dsImpr;
    const clicks    = dsClicks;

    // calculated metrics
    const roi       = spend>0?Math.round((rev-spend)/spend*100):null;
    const cpl       = leads>0&&spend>0?Math.round(spend/leads):null;
    const cpb       = booked>0&&spend>0?Math.round(spend/booked):null;
    const leadToComp= leads>0?+(booked/leads*100).toFixed(2):null;
    const salePct   = booked>0?+(sold/booked*100).toFixed(2):null;
    const cps       = sold>0&&spend>0?Math.round(spend/sold):null;
    const cpc       = clicks>0&&spend>0?+(spend/clicks).toFixed(2):null;
    const clickToLead= clicks>0&&leads>0?+(leads/clicks*100).toFixed(2):null;
    const mer       = rev>0&&spend>0?+(spend/rev*100).toFixed(2):null; // Marketing Expense Ratio

    totRev+=rev; totSpend+=spend; totLeads+=leads; totBooked+=booked; totSold+=sold; totImpr+=impr; totClicks+=clicks;

    const matchBadge = dashSrc
      ? `<span class="match-badge match-ok">✓</span>`
      : (srcName!=='Unknown'?`<span class="match-badge match-warn">⚠</span>`:`<span class="match-badge match-none">—</span>`);

    const roiBadgeHtml = roi!==null?`<span class="badge ${roi>=100?'bg':roi<0?'br':'bn'}">${roi}%</span>`:'<span class="muted">—</span>';

    srcRows += `<div class="src-finance-row">
      <div class="src-finance-cell bold">${srcName} ${matchBadge}</div>
      <div class="src-finance-cell r bold">$${fmt(rev)}</div>
      <div class="src-finance-cell r">${roiBadgeHtml}</div>
      <div class="src-finance-cell r">${spend>0?'$'+fmt(spend):'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${fmt(leads)}</div>
      <div class="src-finance-cell r">${cpl!==null?'$'+fmt(cpl):'<span class="muted">—</span>'}</div>

      <div class="src-finance-cell r">${fmt(sold)}</div>
      <div class="src-finance-cell r">${salePct!==null?salePct+'%':'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${cps!==null?'$'+fmt(cps):'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${impr>0?fmt(impr):'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${clicks>0?fmt(clicks):'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${cpc!==null?'$'+cpc:'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${clickToLead!==null?clickToLead+'%':'<span class="muted">—</span>'}</div>
      <div class="src-finance-cell r">${mer!==null?mer+'%':'<span class="muted">—</span>'}</div>
    </div>`;
  });

  // totals row
  const totRoi   = totSpend>0?Math.round((totRev-totSpend)/totSpend*100):null;
  const totCpl   = totLeads>0&&totSpend>0?Math.round(totSpend/totLeads):null;
  const totCpb   = totBooked>0&&totSpend>0?Math.round(totSpend/totBooked):null;
  const totL2B   = totLeads>0?+(totBooked/totLeads*100).toFixed(2):null;
  const totSalePct=totBooked>0?+(totSold/totBooked*100).toFixed(2):null;
  const totCps   = totSold>0&&totSpend>0?Math.round(totSpend/totSold):null;
  const totCpc   = totClicks>0&&totSpend>0?+(totSpend/totClicks).toFixed(2):null;
  const totCl2L  = totClicks>0&&totLeads>0?+(totLeads/totClicks*100).toFixed(2):null;
  const totMer   = totRev>0&&totSpend>0?+(totSpend/totRev*100).toFixed(2):null;
  const totAvgJob= totSold>0?Math.round(totRev/totSold):0;

  srcRows += `<div class="src-finance-row" style="background:var(--bg2);font-weight:600">
    <div class="src-finance-cell bold">Итого</div>
    <div class="src-finance-cell r bold">$${fmt(totRev)}</div>
    <div class="src-finance-cell r">${totRoi!==null?`<span class="badge ${totRoi>=100?'bg':totRoi<0?'br':'bn'}">${totRoi}%</span>`:'—'}</div>
    <div class="src-finance-cell r bold">${totSpend>0?'$'+fmt(totSpend):'—'}</div>
    <div class="src-finance-cell r bold">${fmt(totLeads)}</div>
    <div class="src-finance-cell r">${totCpl!==null?'$'+fmt(totCpl):'—'}</div>

    <div class="src-finance-cell r bold">${fmt(totSold)}</div>
    <div class="src-finance-cell r">${totSalePct!==null?totSalePct+'%':'—'}</div>
    <div class="src-finance-cell r">${totCps!==null?'$'+fmt(totCps):'—'}</div>
    <div class="src-finance-cell r">${totImpr>0?fmt(totImpr):'—'}</div>
    <div class="src-finance-cell r">${totClicks>0?fmt(totClicks):'—'}</div>
    <div class="src-finance-cell r">${totCpc!==null?'$'+totCpc:'—'}</div>
    <div class="src-finance-cell r">${totCl2L!==null?totCl2L+'%':'—'}</div>
    <div class="src-finance-cell r">${totMer!==null?totMer+'%':'—'}</div>
  </div>`;

  const srcTableHtml = `
  <div class="section-label">По источнику лидов</div>
  <div style="overflow-x:auto;margin-bottom:18px">
  <div class="src-finance-grid" style="min-width:1400px">
    <div class="src-finance-row head" style="grid-template-columns:160px repeat(13,1fr)">
      <div class="src-finance-cell">Источник</div>
      <div class="src-finance-cell r">Revenue</div>
      <div class="src-finance-cell r">ROI %</div>
      <div class="src-finance-cell r">Spend</div>
      <div class="src-finance-cell r">Leads</div>
      <div class="src-finance-cell r">CPL</div>
      <div class="src-finance-cell r">Completed Jobs</div>
      <div class="src-finance-cell r">CPC Jobs</div>
      <div class="src-finance-cell r">Ld→Comp%</div>
      <div class="src-finance-cell r">Jobs Sold</div>
      <div class="src-finance-cell r">Sale Conv%</div>
      <div class="src-finance-cell r">Cost/Sold</div>
      <div class="src-finance-cell r">Impr.</div>
      <div class="src-finance-cell r">Clicks</div>
      <div class="src-finance-cell r">CPC</div>
      <div class="src-finance-cell r">Clk→Ld%</div>
      <div class="src-finance-cell r">MER%</div>
    </div>
    ${srcRows.replace(/src-finance-row(?!"| head| style)/g, 'src-finance-row" style="grid-template-columns:160px repeat(13,1fr)')}
  </div>
  </div>`;

  // ── Job type breakdown ────────────────────────────────────────
  const typeRows = Object.entries(byType).sort((a,b)=>b[1].revenue-a[1].revenue).map(([type,d])=>{
    const avg = d.jobs>0?Math.round(d.revenue/d.jobs):0;
    const pct = totalRevenue>0?Math.round(d.revenue/totalRevenue*100):0;
    return `<div class="src-finance-row">
      <div class="src-finance-cell bold">${type||'—'}</div>
      <div class="src-finance-cell r">${d.jobs}</div>
      <div class="src-finance-cell r bold">$${fmt(d.revenue)}</div>
      <div class="src-finance-cell r">$${fmt(avg)}</div>
      <div class="src-finance-cell r">${pct}%</div>
    </div>`;
  }).join('');

  const typeTableHtml = `
  <div class="section-label" style="margin-top:8px">По типу работ</div>
  <div class="src-finance-grid">
    <div class="src-finance-row head" style="grid-template-columns:180px 1fr 1fr 1fr 1fr">
      <div class="src-finance-cell">Тип</div>
      <div class="src-finance-cell r">Jobs</div>
      <div class="src-finance-cell r">Revenue</div>
      <div class="src-finance-cell r">Avg Job $</div>
      <div class="src-finance-cell r">Rev %</div>
    </div>
    ${typeRows.replace(/grid-template-columns:[^;]+;/g,'').replace(/src-finance-row(?!.*(head|total))/g,'src-finance-row" style="grid-template-columns:180px 1fr 1fr 1fr 1fr')}
  </div>`;

  // ── Monthly trend ─────────────────────────────────────────────
  const sortedMonths = Object.entries(byMonth)
    .filter(([mk])=>mk!=='Unknown')
    .sort((a,b)=>{
      const pa=a[0].split(' '),pb=b[0].split(' ');
      return (+pa[1]-+pb[1])||MN.indexOf(pa[0])-MN.indexOf(pb[0]);
    });

  const monthTableHtml = sortedMonths.length>1?`
  <div class="section-label" style="margin-top:8px">Помесячно</div>
  <div class="charts-row c2">
    <div class="chart-card"><div class="ct">Revenue по месяцам (HCP)</div><div class="cs">Фактические данные из Housecall</div><div style="position:relative;height:200px"><canvas id="hcMonthBar"></canvas></div></div>
    <div class="chart-card"><div class="ct">Jobs по месяцам (HCP)</div><div class="cs">Количество выполненных работ</div><div style="position:relative;height:200px"><canvas id="hcMonthJobs"></canvas></div></div>
  </div>`:'' ;

  // ── Upload another ────────────────────────────────────────────
  const reuploadHtml = `<div class="hc-loaded">
    <div class="hc-loaded-info">
      <div class="hc-loaded-dot"></div>
      <span><strong>${totalJobs} jobs</strong> загружено из Housecall Pro</span>
    </div>
    <button class="hc-clear" onclick="document.getElementById('hcReupload').click()">⬆ Обновить</button>
    <input type="file" id="hcReupload" accept=".csv" style="display:none">
    <button class="hc-clear" onclick="hcData=null;save();renderAllPages()" style="color:var(--accent)">✕ Очистить</button>
  </div>`;

  el.innerHTML = reuploadHtml + kpiHtml + funnelHtml + srcTableHtml + typeTableHtml + monthTableHtml;

  // bind reupload
  document.getElementById('hcReupload').addEventListener('change',function(){if(this.files[0])importHousecall(this.files[0])});

  // draw charts
  if(sortedMonths.length>1){
    const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
    const tick=isDark?'#888':'#888780';const grid=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
    setTimeout(()=>{
      const labels=sortedMonths.map(([mk])=>mk);
      buildBarChart('hcMonthBar',labels,sortedMonths.map(([,d])=>d.revenue),labels.map((_,i)=>POOL[i%POOL.length]),tick,grid);
      buildBarChart('hcMonthJobs',labels,sortedMonths.map(([,d])=>d.jobs),labels.map((_,i)=>POOL[(i+3)%POOL.length]),tick,grid);
      // override Y axis for jobs (no $ prefix)
      if(chartInstances['hcMonthJobs']){
        chartInstances['hcMonthJobs'].options.scales.y.ticks.callback=v=>v;
        chartInstances['hcMonthJobs'].update();
      }
    },0);
  }
}

function setupDropZone(id){
  const zone=document.getElementById(id);if(!zone)return;
  zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag')});
  zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
  zone.addEventListener('drop',e=>{
    e.preventDefault();zone.classList.remove('drag');
    const file=e.dataTransfer?.files[0];
    if(file)importHousecall(file);
  });
}

</script>
</body>
</html>
